name: Build and push agent-runtime image

on:
  push:
    branches:
      - main
    paths:
      - "agent-runtime/src/**"
      - "agent-runtime/package*.json"
      - "agent-runtime/tsconfig.json"
      - "agent-runtime/Dockerfile"
      - "agent-runtime/scripts/**"
      - "schemas/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:
    inputs:
      go_version:
        description: "Go version override (e.g. 1.24.2)"
        required: false
        default: "1.25.0"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-runtime

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent-runtime/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ github.event.inputs.go_version || '1.25.0' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
