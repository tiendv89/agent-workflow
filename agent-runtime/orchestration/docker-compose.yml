# Agent-runtime — unified Docker Compose
#
# Two profiles:
#   dev  — Two locally-built agents. Exercises the git-based claim protocol
#           under real concurrency. Use for local testing and development.
#   prod — Single supervisor loop on a 5-minute cadence using the published
#           GHCR image. Use for a single Linux VM or local server.
#
# For multi-agent production, run the prod profile on multiple hosts or use
# the Kubernetes CronJob (orchestration/kubernetes/cronjob.yaml) instead.
#
# Usage (from the orchestration/ directory):
#   docker compose --profile dev up --build   # local 2-agent test
#   docker compose --profile prod up -d       # production supervisor
#
# Or from the workflow/ root:
#   docker compose -f agent-runtime/orchestration/docker-compose.yml --profile dev up --build
#
# Requirements:
#   cp .env.example .env              # then fill in required values
#   cp agent.yaml.example agent.yaml  # then set watches: to your workspace SSH URL

name: agent-runtime

# ── Shared dev-agent definition ───────────────────────────────────────────────
x-agent: &agent-base
  build:
    # Build context is workflow/ root so schemas/ is included.
    context: ../..
    dockerfile: ../../Dockerfile
  env_file: .env
  environment:
    AGENT_YAML_PATH: /agent/agent.yaml
    WORKFLOW_LOCAL_PATH: /workflow
    WORKSPACES_ROOT: /agent/data
    # SSH key delivery: SSH_PRIVATE_KEY (env var, preferred) or SSH_KEY_PATH (file mount).
    # SSH_PRIVATE_KEY is passed through from .env if set.
    SSH_PRIVATE_KEY: "${SSH_PRIVATE_KEY:-}"
    SSH_KEY_PATH: /agent/ssh/id_rsa
  volumes:
    - ./agent.yaml:/agent/agent.yaml:ro
    - workspaces:/agent/data
    - ${SSH_KEY_DIR:-${HOME}/.ssh}:/agent/ssh:ro
  restart: "no"   # single-run semantics; orchestration is external
  profiles: [dev]

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # dev: two locally-built agents ───────────────────────────────────────────────
  agent-1:
    <<: *agent-base
    environment:
      AGENT_YAML_PATH: /agent/agent.yaml
      WORKFLOW_LOCAL_PATH: /workflow
      WORKSPACES_ROOT: /agent/data
      SSH_PRIVATE_KEY: "${SSH_PRIVATE_KEY:-}"
      SSH_KEY_PATH: /agent/ssh/id_rsa
      GIT_AUTHOR_NAME: "Agent 1"

  agent-2:
    <<: *agent-base
    environment:
      AGENT_YAML_PATH: /agent/agent.yaml
      WORKFLOW_LOCAL_PATH: /workflow
      WORKSPACES_ROOT: /agent/data
      SSH_PRIVATE_KEY: "${SSH_PRIVATE_KEY:-}"
      SSH_KEY_PATH: /agent/ssh/id_rsa
      GIT_AUTHOR_NAME: "Agent 2"

  # prod: supervisor loop using the published GHCR image ─────────────────────
  supervisor:
    image: docker:27-cli
    restart: always
    env_file: .env
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GIT_AUTHOR_NAME: "${GIT_AUTHOR_NAME:-Agent Bot}"
      GIT_AUTHOR_EMAIL: "${GIT_AUTHOR_EMAIL}"
      SSH_PRIVATE_KEY: "${SSH_PRIVATE_KEY:-}"
    volumes:
      # Docker socket — supervisor needs it to launch agent containers
      - /var/run/docker.sock:/var/run/docker.sock
      # agent.yaml — read by each agent run
      - ./agent.yaml:/etc/agent/agent.yaml:ro
      # SSH keys
      - ${SSH_KEY_DIR:-${HOME}/.ssh}:/etc/agent/ssh:ro
      # Shared workspace clones volume
      - workspaces:/agent/data
    command:
      - sh
      - -c
      - |
        set -e
        IMAGE="${AGENT_IMAGE:-ghcr.io/tiendv89/agent-runtime:latest}"

        echo "Supervisor started. Pulling image: $${IMAGE}"
        docker pull "$${IMAGE}"

        while true; do
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Starting agent activation..."
          docker run --rm \
            -e ANTHROPIC_API_KEY="$${ANTHROPIC_API_KEY}" \
            -e GIT_AUTHOR_NAME="$${GIT_AUTHOR_NAME}" \
            -e GIT_AUTHOR_EMAIL="$${GIT_AUTHOR_EMAIL}" \
            -e SSH_PRIVATE_KEY="$${SSH_PRIVATE_KEY:-}" \
            -e SSH_KEY_PATH=/agent/ssh/id_rsa \
            -v /etc/agent/agent.yaml:/agent/agent.yaml:ro \
            -v "$${SSH_KEY_DIR:-$${HOME}/.ssh}:/agent/ssh:ro" \
            -v workspaces:/agent/data \
            "$${IMAGE}" || true   # non-zero exit is logged, not fatal to the loop
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Activation complete. Sleeping 300s..."
          sleep 300
        done
    profiles: [prod]

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  workspaces:
    driver: local
