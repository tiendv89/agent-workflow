# Agent-runtime — Kubernetes orchestration
#
# Applies everything needed for a production agent deployment:
#   Namespace → PersistentVolumeClaim → ConfigMap → Secret → CronJob
#
# Usage:
#   # 1. Edit the ConfigMap (agent.yaml watches list) and Secret (keys) below.
#   # 2. Apply:
#   kubectl apply -f orchestration/kubernetes/cronjob.yaml
#
# The CronJob fires every 5 minutes. concurrencyPolicy: Forbid ensures only
# one activation cycle runs at a time. Deploy multiple CronJobs (different
# names / namespaces) to run multiple independent agents in parallel.

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: agent-runtime

---
# ── Workspace volume (persists repo clones between activations) ───────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-workspaces
  namespace: agent-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard   # uncomment and set for your cluster

---
# ── Agent configuration (agent.yaml) ─────────────────────────────────────────
# Edit the agent.yaml block below to point at your workspace repo(s).
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: agent-runtime
data:
  agent.yaml: |
    # SSH URLs of workspace management repos this agent watches.
    watches:
      - git@github.com:your-org/your-workspace.git

    enabled: true
    jitter_max_seconds: 2

    budget:
      max_tokens_per_task: 100000
      max_iterations: 30
      suggested_next_step_max_tokens: 1000

    log_sink:
      enabled: true

---
# ── Secrets (API key + SSH private key) ──────────────────────────────────────
# Replace placeholder values before applying.
# Recommended: manage with Sealed Secrets, ESO, or Vault rather than editing here.
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agent-runtime
type: Opaque
stringData:
  # Anthropic API key — obtain from console.anthropic.com
  ANTHROPIC_API_KEY: "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY"
  # GitHub personal access token with `repo` scope — required by the pr-create skill.
  # Create at: https://github.com/settings/tokens
  GITHUB_TOKEN: "REPLACE_WITH_YOUR_GITHUB_TOKEN"
  # SSH private key with read/write access to your workspace repo(s).
  # Paste the full PEM content (including header/footer lines).
  SSH_PRIVATE_KEY: |
    REPLACE_WITH_YOUR_SSH_PRIVATE_KEY

---
# ── CronJob ───────────────────────────────────────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agent-runtime
  namespace: agent-runtime
  labels:
    app: agent-runtime
spec:
  # Fire every 5 minutes.
  schedule: "*/5 * * * *"
  # Never run two activations in parallel — the claim protocol handles
  # multi-agent concurrency at the git level, not the scheduler level.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      # Do not retry failed jobs — the next cron tick will retry instead.
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: agent-runtime
        spec:
          restartPolicy: Never

          # ── Security context ───────────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000

          containers:
            - name: agent
              image: ghcr.io/tiendv89/agent-runtime:latest
              imagePullPolicy: Always

              # ── Environment ────────────────────────────────────────────────
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: agent-secrets
                      key: ANTHROPIC_API_KEY
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: agent-secrets
                      key: GITHUB_TOKEN
                - name: SSH_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: agent-secrets
                      key: SSH_PRIVATE_KEY
                - name: GIT_AUTHOR_NAME
                  value: "Agent Bot"
                - name: GIT_AUTHOR_EMAIL
                  value: "agent@example.com"   # change to your bot email

              # ── Volume mounts ──────────────────────────────────────────────
              volumeMounts:
                # agent.yaml from ConfigMap
                - name: agent-config
                  mountPath: /agent/agent.yaml
                  subPath: agent.yaml
                  readOnly: true
                # Workspace clones — persisted across activations
                - name: workspaces
                  mountPath: /agent/data

              # ── Resource limits ────────────────────────────────────────────
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi

              # ── Security ───────────────────────────────────────────────────
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false   # agent writes log files
                capabilities:
                  drop:
                    - ALL

          # ── Volumes ────────────────────────────────────────────────────────
          volumes:
            - name: agent-config
              configMap:
                name: agent-config
            - name: workspaces
              persistentVolumeClaim:
                claimName: agent-workspaces
