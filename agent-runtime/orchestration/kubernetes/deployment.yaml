# Agent-runtime — Kubernetes orchestration
#
# Applies everything needed for a production agent deployment:
#   Namespace → PersistentVolumeClaim → ConfigMap → Secret → Deployment
#
# Usage:
#   # 1. Edit the ConfigMap (agent.yaml watches list) and Secret (keys) below.
#   # 2. Apply:
#   kubectl apply -f orchestration/kubernetes/deployment.yaml
#
# The Deployment runs one long-lived pod that polls for tasks on an internal
# loop (idle_sleep_seconds). The pod restarts automatically on crash.
# Deploy multiple Deployments (different names / namespaces) to run multiple
# independent agents in parallel.

# ── Namespace ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: agent-runtime

---
# ── Workspace volume (persists repo clones between activations) ───────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-workspaces
  namespace: agent-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard   # uncomment and set for your cluster

---
# ── Agent configuration (agent.yaml) ─────────────────────────────────────────
# Edit the agent.yaml block below to point at your workspace repo(s).
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: agent-runtime
data:
  agent.yaml: |
    # SSH URLs of workspace management repos this agent watches.
    watches:
      - git@github.com:your-org/your-workspace.git

    enabled: true
    jitter_max_seconds: 2

    budget:
      max_tokens_per_task: 100000
      max_iterations: 30

    log_sink:
      enabled: true

    # Seconds to sleep between poll cycles when no eligible task is found,
    # and after a successful task run.
    # Set to 0 for single-shot mode (one cycle then exit — for external schedulers).
    idle_sleep_seconds: 60

---
# ── Secrets (API key + SSH private key) ──────────────────────────────────────
# Replace placeholder values before applying.
# Recommended: manage with Sealed Secrets, ESO, or Vault rather than editing here.
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: agent-runtime
type: Opaque
stringData:
  # Anthropic API key — obtain from console.anthropic.com
  ANTHROPIC_API_KEY: "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY"
  # GitHub personal access token with `repo` scope — required by the pr-create skill.
  # Create at: https://github.com/settings/tokens
  GITHUB_TOKEN: "REPLACE_WITH_YOUR_GITHUB_TOKEN"
  # SSH private key with read/write access to your workspace repo(s).
  # Paste the full PEM content (including header/footer lines).
  SSH_PRIVATE_KEY: |
    REPLACE_WITH_YOUR_SSH_PRIVATE_KEY

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime
  namespace: agent-runtime
  labels:
    app: agent-runtime
spec:
  # One agent per Deployment. Scale horizontally by deploying additional
  # Deployments with distinct GIT_AUTHOR_EMAIL values (each agent needs
  # a unique identity for the git claim protocol).
  replicas: 1
  selector:
    matchLabels:
      app: agent-runtime
  template:
    metadata:
      labels:
        app: agent-runtime
    spec:
      # ── Security context ─────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: agent
          image: ghcr.io/tiendv89/agent-runtime:latest
          imagePullPolicy: Always

          # ── Environment ──────────────────────────────────────────────────────
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: ANTHROPIC_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: GITHUB_TOKEN
            - name: SSH_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: SSH_PRIVATE_KEY
            - name: GIT_AUTHOR_NAME
              value: "Agent Bot"
            - name: GIT_AUTHOR_EMAIL
              value: "agent@example.com"   # change to your bot email

          # ── Liveness probe ───────────────────────────────────────────────────
          # Confirms the node process is still running. K8s restarts the pod
          # if the process exits or becomes unresponsive.
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "dist/main.js"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          # ── Volume mounts ────────────────────────────────────────────────────
          volumeMounts:
            # agent.yaml from ConfigMap
            - name: agent-config
              mountPath: /agent/agent.yaml
              subPath: agent.yaml
              readOnly: true
            # Workspace clones — persisted across pod restarts
            - name: workspaces
              mountPath: /agent/data
            # Workflow clone — persisted across poll cycles within the same pod
            - name: workflow
              mountPath: /agent/workflow

          # ── Resource limits ──────────────────────────────────────────────────
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          # ── Security ─────────────────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # agent writes log files
            capabilities:
              drop:
                - ALL

      # ── Volumes ──────────────────────────────────────────────────────────────
      volumes:
        - name: agent-config
          configMap:
            name: agent-config
        - name: workspaces
          persistentVolumeClaim:
            claimName: agent-workspaces
        - name: workflow
          emptyDir: {}   # workflow repo; re-cloned once per pod start by bootstrap
