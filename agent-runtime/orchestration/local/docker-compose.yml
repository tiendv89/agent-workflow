# Local 2-agent test setup.
#
# Both agents share a workspace clone volume so they see the same task state
# and contend on the same ready tasks — this exercises the git-based claim
# protocol under real concurrency.
#
# Usage: see agent-runtime/QUICKSTART.md for the full walkthrough.
#
# Run from the workflow/ root:
#   docker compose -f agent-runtime/orchestration/local/docker-compose.yml up --build

name: agent-runtime-local

# ── Shared agent definition ───────────────────────────────────────────────────
x-agent: &agent-base
  build:
    # Build context is the workflow/ root so schemas/ is included.
    context: ../..
    dockerfile: ../../Dockerfile
  env_file: .env
  environment:
    AGENT_YAML_PATH: /agent/agent.yaml
    WORKFLOW_LOCAL_PATH: /workflow
    WORKSPACES_ROOT: /agent/data
    SSH_KEY_PATH: /agent/ssh/id_rsa
  volumes:
    # agent.yaml — shared config, read-only
    - ./agent.yaml:/agent/agent.yaml:ro
    # Workspace clones — shared read-write so both agents see each other's claims
    - workspaces:/agent/data
    # SSH key — mount your ~/.ssh or a directory with id_rsa
    - ${SSH_KEY_DIR:-~/.ssh}:/agent/ssh:ro
  restart: "no"   # single-run semantics; orchestration is external

# ── Services ──────────────────────────────────────────────────────────────────
services:
  agent-1:
    <<: *agent-base
    environment:
      AGENT_YAML_PATH: /agent/agent.yaml
      WORKFLOW_LOCAL_PATH: /workflow
      WORKSPACES_ROOT: /agent/data
      SSH_KEY_PATH: /agent/ssh/id_rsa
      GIT_AUTHOR_NAME: "Agent 1"

  agent-2:
    <<: *agent-base
    environment:
      AGENT_YAML_PATH: /agent/agent.yaml
      WORKFLOW_LOCAL_PATH: /workflow
      WORKSPACES_ROOT: /agent/data
      SSH_KEY_PATH: /agent/ssh/id_rsa
      GIT_AUTHOR_NAME: "Agent 2"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  workspaces:
    driver: local
