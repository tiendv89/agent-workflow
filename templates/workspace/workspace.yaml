workspace_id: project-A
name: Project A
overview_doc: docs/overview.md

approval:
  actor_source: env:GIT_AUTHOR_EMAIL
  fallback_actor: unknown@local
  timestamp_source: local_time

git:
  branch_pattern: "feature/{feature_id}-{work_id}"

environments:
  develop:
    enabled: true
  staging:
    enabled: true
  production:
    enabled: true

roles:
  - product_owner
  - uiux_designer
  - tech_lead
  - backend_engineer
  - frontend_engineer
  - data_engineer
  - infra_engineer
  - qa

# Declare which technical_skills each automated role uses in this project.
# Every skill listed must exist as a directory under workflow/technical_skills/.
role_skill_overrides:
  backend_engineer:
    enabled_skills: []
  frontend_engineer:
    enabled_skills: []
  data_engineer:
    enabled_skills: []

automation:
  enabled: true
  enabled_roles:
    - backend_engineer
    - frontend_engineer
    - data_engineer
  actor_type_defaults:
    backend_engineer: agent
    frontend_engineer: agent
    data_engineer: agent
    infra_engineer: human
    qa: human

repos:
  - id: project-A-api
    github: https://github.com/example/project-A-api.git
    local_path: env:PROJECT_A_API_LOCAL_PATH
    base_branch: main
    owner_role: backend_engineer

  - id: project-A-web
    github: https://github.com/example/project-A-web.git
    local_path: env:PROJECT_A_WEB_LOCAL_PATH
    base_branch: main
    owner_role: frontend_engineer

  - id: project-A-data
    github: https://github.com/example/project-A-data.git
    local_path: env:PROJECT_A_DATA_LOCAL_PATH
    base_branch: main
    owner_role: data_engineer
